spring:
  application:
    name: focuspilot-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/focuspilot}
    username: ${DATABASE_USERNAME:focuspilot}
    password: ${DATABASE_PASSWORD:focuspilot}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
server:
  port: 8080
app:
  security:
    jwt:
      secret: ${JWT_SECRET:focuspilot-dev-secret-key-please-change-me}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
